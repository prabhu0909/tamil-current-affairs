<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>TNPSC Current Affairs</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1a237e;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
}

.search{
margin:20px 0;
text-align:center;
}

.search input{
width:60%;
padding:10px;
font-size:16px;
}

.categories{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:20px;
}

.categories button{
padding:10px 15px;
border:none;
background:#3949ab;
color:white;
border-radius:5px;
cursor:pointer;
}

.news-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.news-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.news-card h2{
font-size:18px;
color:#1a237e;
}

.news-card p{
font-size:14px;
}

.news-card a{
text-decoration:none;
color:#0d47a1;
font-weight:bold;
}

.category{
background:#e8eaf6;
padding:5px 10px;
display:inline-block;
border-radius:5px;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h1>TNPSC & Banking தேர்வு நடப்பு நிகழ்வுகள்</h1>
<p>Daily Current Affairs for Competitive Exams</p>

</header>

<div class="container">

<div class="search">

<input type="text" id="search" placeholder="Search news...">

</div>

<div class="categories">

<button onclick="filter('all')">All</button>
<button onclick="filter('தமிழ்நாடு')">தமிழ்நாடு</button>
<button onclick="filter('இந்தியா')">இந்தியா</button>
<button onclick="filter('உலகம்')">உலகம்</button>
<button onclick="filter('பொருளாதாரம்')">பொருளாதாரம்</button>

</div>

<div class="news-grid" id="news"></div>

</div>

<script>

let allNews = []

fetch("http://18.208.166.99:8000/news")

.then(res=>res.json())

.then(data=>{

allNews=data
display(data)

})

function display(news){

let html=""

news.forEach(n=>{

html+=`
<div class="news-card">

<h2>${n.title}</h2>

<p>${n.summary}</p>

<div class="category">${n.category}</div>

<p><b>Source:</b> ${n.source}</p>

<a href="${n.link}" target="_blank">Read Full News</a>

</div>
`

})

document.getElementById("news").innerHTML=html

}

function filter(cat){

if(cat=="all"){

display(allNews)

return

}

let filtered=allNews.filter(n=>n.category==cat)

display(filtered)

}

document.getElementById("search").addEventListener("input",function(){

let text=this.value.toLowerCase()

let filtered=allNews.filter(n=>n.title.toLowerCase().includes(text))

display(filtered)

})

</script>

</body>

</html>
